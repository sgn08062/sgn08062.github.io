  Java, Spring boot3, JPA로 백엔드 프로젝트를 진행한 경험이 있는 신입 개발자입니다.
  적극적인 질문과 탐구심으로 문제 해결 능력과 새로운 것에 도전하는 인재가 되겠습니다.

